<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Research - Resynth AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f1117; --surface: #161b22; --text: #f0f6fc; --accent: #10b981; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; padding: 40px 20px; }
        .container { max-width: 800px; margin: auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .report-content { background: var(--surface); padding: 32px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
        h1, h2 { color: var(--accent); }
        .sources { margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .source-link { display: block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 8px; }
        .watermark { text-align: center; margin-top: 40px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="/static/logo.png" alt="Resynth" style="height:32px; margin-bottom:12px;">
            <p style="font-size: 14px; opacity: 0.7;">Shared Research Report</p>
        </div>
        <div class="report-content" id="content"></div>
        <div class="sources" id="sources"></div>
        <div class="watermark">Generated by Resynth AI Research Agent</div>
    </div>

    <script>
        const report = {{ report|tojson }};
        const contentEl = document.getElementById('content');
        contentEl.innerHTML = marked.parse(report.content || '');
        
        // Math rendering
        renderMathInElement(contentEl, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false}
            ],
            throwOnError: false
        });

        if (report.sources) {
            const sources = JSON.parse(report.sources);
            const sourcesEl = document.getElementById('sources');
            sourcesEl.innerHTML = '<h3>Sources</h3>';
            sources.forEach((s, i) => {
                const a = document.createElement('a');
                a.className = 'source-link';
                a.href = s.url;
                a.target = '_blank';
                a.innerText = `[${i+1}] ${s.title}`;
                sourcesEl.appendChild(a);
            });
        }
    </script>
</body>
</html>
