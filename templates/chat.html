<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xynth AI</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&display=swap" rel="stylesheet">
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#121212">
    <link rel="apple-touch-icon" href="/static/logo.png">
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg: #121212;
            --surface: #1E1E1E;
            --surface-hover: #2C2C2C;
            --border: #333333;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --radius: 12px;
            --font: 'Bricolage Grotesque', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font);
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        /* --- Modals --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.hidden { display: none; }
        .modal {
            background: var(--surface);
            padding: 32px;
            border-radius: var(--radius);
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .modal h2 { margin-bottom: 12px; font-weight: 600; }
        .modal p { color: var(--text-secondary); margin-bottom: 24px; font-size: 14px; }
        .modal input {
            width: 100%; padding: 12px; margin-bottom: 12px;
            background: var(--bg); border: 1px solid var(--border);
            color: white; border-radius: 8px; outline: none;
        }
        .modal input:focus { border-color: var(--accent); }
        .btn {
            width: 100%; padding: 12px; border-radius: 8px;
            border: none; background: var(--accent); color: white;
            font-weight: 600; cursor: pointer; transition: 0.2s; margin-bottom: 8px;
        }
        .btn:hover { background: var(--accent-hover); }
        .btn-outline {
            background: transparent; border: 1px solid var(--border);
        }
        .btn-outline:hover { background: var(--surface-hover); }

        /* --- Sidebar --- */
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 16px;
            transition: transform 0.3s ease;
            z-index: 100;
        }
        .brand {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }
        .brand img {
            height: 24px;
            filter: invert(1);
        }
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            color: var(--text-primary);
            text-decoration: none;
            cursor: pointer;
            border: none;
            background: transparent;
            font-size: 14px;
            font-weight: 500;
            text-align: left;
            width: 100%;
            margin-bottom: 4px;
        }
        .nav-btn:hover { background: var(--surface-hover); }
        .new-chat-btn {
            background: var(--text-primary);
            color: var(--bg);
            margin-bottom: 24px;
        }
        .new-chat-btn:hover { background: #e0e0e0; }
        .spacer { flex: 1; }
        .user-profile {
            border-top: 1px solid var(--border);
            padding-top: 16px;
            margin-top: 16px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .chat-list {
            overflow-y: auto;
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            max-height: calc(100vh - 260px);
        }
        .chat-list-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            text-transform: uppercase;
            padding: 12px 12px 4px;
        }
        .history-item {
            padding: 9px 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: transparent;
            border: none;
            text-align: left;
            width: 100%;
            transition: background 0.15s, color 0.15s;
        }
        .history-item:hover, .history-item.active {
            background: var(--surface-hover);
            color: var(--text-primary);
        }
        .close-sidebar-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
        }

        /* --- Main Area --- */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
        }

        .top-nav {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 10;
        }
        .toggle-sidebar {
            background: none; border: none; color: var(--text-primary);
            font-size: 24px; cursor: pointer; display: none;
        }
        .model-selector {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            padding-right: 32px;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 12px top 50%;
            background-size: 10px auto;
        }

        /* --- Landing View --- */
        .landing-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s;
        }
        .landing-view img {
            height: 40px;
            filter: invert(1);
            margin-bottom: 24px;
        }
        .landing-view h1 {
            font-size: 28px;
            font-weight: 600;
        }

        /* --- Chat View --- */
        .chat-view {
            flex: 1;
            overflow-y: auto;
            padding: 80px 16px 20px;
            display: none;
            scroll-behavior: smooth;
        }
        .chat-view.active { display: block; }
        .messages-container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .message {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .message.user { align-items: flex-end; }
        .message.bot { align-items: flex-start; }
        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.6;
        }
        .message.user .bubble {
            background: var(--surface-hover);
            border-bottom-right-radius: 4px;
            color: var(--text-primary);
        }
        .message.bot .bubble {
            background: transparent;
            padding: 0;
            max-width: 100%;
        }
        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .message.bot:hover .message-actions {
            opacity: 1;
        }
        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
        }
        .action-btn:hover {
            background: var(--surface-hover);
            color: var(--text-primary);
        }
        .action-btn svg { width: 14px; height: 14px; }
        
        /* Markdown styling */
        .bubble p { margin-bottom: 16px; line-height: 1.65; font-size: 15px; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble h1, .bubble h2, .bubble h3 { margin-top: 24px; margin-bottom: 12px; font-weight: 600; }
        .bubble li { margin-bottom: 8px; line-height: 1.65; font-size: 15px; }
        .bubble a { color: #10b981; text-decoration: none; font-weight: 500; }
        .bubble a:hover { text-decoration: underline; }
        .bubble pre { background: var(--surface); padding: 12px; border-radius: 8px; overflow-x: auto; margin-bottom: 12px; border: 1px solid var(--border); }
        .bubble code { font-family: monospace; background: var(--surface); padding: 2px 4px; border-radius: 4px; font-size: 0.9em; }
        .bubble pre code { padding: 0; border: none; }

        /* --- Suggestions --- */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-width: 768px;
            margin: auto auto 24px;
        }
        .suggestion-chip {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .suggestion-chip:hover {
            background: var(--surface-hover);
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        /* --- Input Area --- */
        .input-area {
            padding: 16px;
            background: linear-gradient(180deg, transparent, var(--bg) 20%);
        }
        .image-preview-container {
            display: none;
            margin-bottom: 8px;
            position: relative;
            width: fit-content;
        }
        .image-preview {
            max-height: 60px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .remove-image-btn {
            position: absolute;
            top: -6px; right: -6px;
            background: #ef4444; color: white;
            border: none; border-radius: 50%;
            width: 20px; height: 20px;
            font-size: 12px; cursor: pointer;
            display: grid; place-items: center;
        }
        .input-container {
            max-width: 768px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            align-items: flex-end;
            padding: 8px 16px;
            transition: 0.2s;
        }
        .input-container:focus-within { border-color: var(--text-secondary); }
        .icon-btn {
            background: none; border: none; color: var(--text-secondary);
            font-size: 20px; cursor: pointer; padding: 8px;
            border-radius: 50%; display: grid; place-items: center;
        }
        .icon-btn:hover { color: var(--text-primary); background: var(--surface-hover); }
        .icon-btn.send-btn { background: var(--text-primary); color: var(--bg); margin-left: 4px; transition: background-color 0.2s; }
        .icon-btn.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .icon-btn.send-btn.stop { background: #ef4444; }
        
        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            padding: 10px 8px;
            resize: none;
            outline: none;
            max-height: 150px;
            font-family: inherit;
        }
        .footer-text {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 12px;
        }
        
        .deep-dive-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 12px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            font-weight: 500;
            width: max-content;
        }
        .deep-dive-btn.active {
            background: white;
            color: black;
            border-color: white;
        }

        /* --- Countdown --- */
        .countdown {
            font-variant-numeric: tabular-nums;
            font-weight: 700;
            font-size: 24px;
            margin: 16px 0;
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -260px;
                top: 0; bottom: 0;
            }
            .sidebar.open { transform: translateX(260px); }
            .toggle-sidebar { display: block; }
            .landing-view h1 { font-size: 24px; }
            .bubble { max-width: 90%; }
        }
    </style>
</head>
<body>

    <!-- Auth Modal -->
    <div id="authModal" class="modal-overlay">
        <div class="modal">
            <img src="/static/logo.png" alt="Xynth" style="height: 24px; filter: invert(1); margin-bottom: 20px;">
            <h2>Welcome Back</h2>
            <p>Log in or sign up to continue to Xynth.</p>
            <input type="email" id="emailInput" placeholder="Email Address">
            <input type="password" id="passwordInput" placeholder="Password">
            <button id="loginBtn" class="btn">Log In</button>
            <button id="signupBtn" class="btn btn-outline">Sign Up</button>
            <div id="authError" style="color: #ef4444; margin-top: 12px; font-size: 13px;"></div>
        </div>
    </div>

    <!-- Limit Reached Modal -->
    <div id="limitModal" class="modal-overlay hidden">
        <div class="modal">
            <h2 id="limitTitle">Daily Limit Reached</h2>
            <p id="limitMessage">You have hit your message limit for today. Please come back in:</p>
            <div class="countdown" id="countdownTimer">00:00:00</div>
            <p id="limitDate" style="font-size: 12px; color: var(--text-secondary);"></p>
            <button class="btn" onclick="document.getElementById('limitModal').classList.add('hidden')">Got it</button>
        </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="brand" style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <img src="/static/logo.png" alt="Xynth">
            </div>
            <button class="close-sidebar-btn" id="closeSidebarBtn">✕</button>
        </div>
        <button class="nav-btn new-chat-btn" id="newChatBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            New Chat
        </button>
        <a href="#" class="nav-btn">Pricing</a>
        <a href="#" class="nav-btn">What's New</a>

        <div class="chat-list-label">Recent</div>
        <div class="chat-list" id="chatList">
            <!-- Historical chats will go here -->
        </div>

        <div class="spacer"></div>
        <div class="user-profile" id="userProfile">
            Not logged in
        </div>
        <button class="nav-btn" id="logoutBtn" style="color: #ef4444; display: none; margin-top: 8px;">Sign Out</button>
    </div>

        <!-- Main -->
    <div class="main">
        <div class="top-nav">
            <button class="toggle-sidebar" id="toggleSidebarBtn">☰</button>
            <select id="modelSelector" class="model-selector">
                <option value="Xynth 1.5">Xynth 1.5</option>
                <option value="Xynth 1.5 Turbo">Xynth 1.5 Turbo</option>
            </select>
        </div>

        <div id="chatView" class="chat-view active" style="display: flex; flex-direction: column;">
            <div class="spacer"></div> <!-- Pushes suggestions down initially -->
            <div id="suggestions" class="suggestions">
                <button class="suggestion-chip">⚛️ How does quantum computing threaten encryption?</button>
                <button class="suggestion-chip">🌍 Latest news in artificial intelligence 2025</button>
                <button class="suggestion-chip">📊 What causes inflation and how to fight it?</button>
                <button class="suggestion-chip">🧬 Explain CRISPR gene editing and its risks</button>
            </div>
            <div class="messages-container" id="messagesContainer"></div>
        </div>

        <div class="input-area">
            <div class="image-preview-container" id="imagePreviewContainer">
                <img id="imagePreview" class="image-preview" src="">
                <button class="remove-image-btn" id="removeImageBtn">✕</button>
            </div>
            <div class="input-container">
                <input type="file" id="fileInput" accept="image/*" style="display:none">
                <button class="icon-btn" id="addFileBtn" title="Add File">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                <textarea id="messageInput" placeholder="Research anything... ask a question, get cited answers" rows="1"></textarea>
                <button class="icon-btn" id="voiceBtn" title="Voice Input">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
                </button>
                <button class="icon-btn send-btn" id="sendBtn" disabled>
                    <svg id="sendIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    <svg id="stopIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                </button>
            </div>
            <div class="input-actions" style="display: flex; margin-top: 8px;">
                <button id="deepDiveBtn" class="deep-dive-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M16 12a4 4 0 0 1-8 0"></path></svg>
                    <span id="deepDiveText">Deep Dive</span>
                </button>
            </div>
            <div class="footer-text">
                Xynth can make mistakes. Consider verifying important information.
            </div>
        </div>
    </div>

    <script>
        // Supabase Init
        const SUPABASE_URL = "https://ujlqigpwoaewdrylesxg.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqbHFpZ3B3b2Fld2RyeWxlc3hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MTk4NDcsImV4cCI6MjA5MzA5NTg0N30.zmcXsds_nFWjpPdh9V_RtpMV3HNrR4Dgk9VsuZ8Jd8Y";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Elements
        const authModal = document.getElementById('authModal');
        const userProfile = document.getElementById('userProfile');
        const logoutBtn = document.getElementById('logoutBtn');
        const chatView = document.getElementById('chatView');
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const sendIcon = document.getElementById('sendIcon');
        const stopIcon = document.getElementById('stopIcon');
        const modelSelector = document.getElementById('modelSelector');
        const limitModal = document.getElementById('limitModal');

        let currentUser = null;
        let currentToken = "";
        let sessionId = localStorage.getItem('xynth_session') || "web-" + Math.random().toString(36).slice(2, 10);
        localStorage.setItem('xynth_session', sessionId);
        let abortController = null;
        let isGenerating = false;
        let lastUserMessage = "";
        let currentChatId = "";
        let currentImageData = null;

        // Auth Logic
        supabaseClient.auth.onAuthStateChange(async (event, session) => {
            if (session) {
                currentUser = session.user;
                currentToken = session.access_token;
                authModal.classList.add('hidden');
                userProfile.textContent = currentUser.email;
                logoutBtn.style.display = 'block';
                loadChatHistory();
            } else {
                currentUser = null;
                currentToken = "";
                authModal.classList.remove('hidden');
                userProfile.textContent = 'Not logged in';
                logoutBtn.style.display = 'none';
            }
        });

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) document.getElementById('authError').textContent = error.message;
        });

        document.getElementById('signupBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) document.getElementById('authError').textContent = error.message;
            else document.getElementById('authError').textContent = "Success! Please log in.";
        });

        logoutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
        });

        // Sidebar toggle (Mobile)
        document.getElementById('toggleSidebarBtn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            sendBtn.disabled = this.value.trim() === '';
        });

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendBtn.disabled) send();
            }
        });

        sendBtn.addEventListener('click', () => {
            if (isGenerating) {
                if (abortController) abortController.abort();
                stopGenerationUI();
            } else {
                send();
            }
        });

        document.getElementById('newChatBtn').addEventListener('click', () => {
            sessionId = "web-" + Math.random().toString(36).slice(2, 10);
            localStorage.setItem('xynth_session', sessionId);
            currentChatId = "";
            messagesContainer.innerHTML = '';
            document.getElementById('suggestions').style.display = 'flex';
            if (window.innerWidth <= 768) document.body.classList.remove('sidebar-open');
        });

        document.getElementById('toggleSidebarBtn').addEventListener('click', () => {
            document.body.classList.toggle('sidebar-open');
        });
        document.getElementById('closeSidebarBtn').addEventListener('click', () => {
            document.body.classList.remove('sidebar-open');
        });

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('toggleSidebarBtn');
            if (window.innerWidth <= 768) {
                if (!sidebar.contains(e.target) && !toggleBtn.contains(e.target) && document.body.classList.contains('sidebar-open')) {
                    document.body.classList.remove('sidebar-open');
                }
            }
        });

        let isDeepDive = false;
        document.getElementById('deepDiveBtn').addEventListener('click', function() {
            isDeepDive = !isDeepDive;
            this.classList.toggle('active', isDeepDive);
            document.getElementById('deepDiveText').textContent = isDeepDive ? 'Deep Diving...' : 'Deep Dive';
        });

        // Handle suggestion chips
        document.querySelectorAll('.suggestion-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                messageInput.value = chip.textContent;
                sendBtn.disabled = false;
                send();
            });
        });

        // History Logic
        async function loadChatHistory() {
            if (!currentToken) return;
            try {
                const res = await fetch('/chats', { headers: { 'Authorization': `Bearer ${currentToken}` } });
                const chats = await res.json();
                const chatList = document.getElementById('chatList');
                chatList.innerHTML = '';
                chats.forEach(chat => {
                    const btn = document.createElement('button');
                    btn.className = 'history-item';
                    btn.textContent = chat.title;
                    btn.onclick = () => loadChat(chat.id, btn);
                    chatList.appendChild(btn);
                });
            } catch(e) { console.error(e); }
        }

        async function loadChat(chatId, btnElement) {
            if (!currentToken) return;
            currentChatId = chatId;
            document.querySelectorAll('.history-item').forEach(b => b.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');
            
            document.getElementById('suggestions').style.display = 'none';
            messagesContainer.innerHTML = '<div style="text-align:center; color:var(--text-secondary); margin-top:40px;">Loading...</div>';
            if (window.innerWidth <= 768) document.body.classList.remove('sidebar-open');

            try {
                const res = await fetch(`/chats/${chatId}`, { headers: { 'Authorization': `Bearer ${currentToken}` } });
                const messages = await res.json();
                messagesContainer.innerHTML = '';
                messages.forEach(msg => appendMessage(msg.role, msg.content));
            } catch(e) {
                messagesContainer.innerHTML = '<div style="text-align:center; color:#ef4444; margin-top:40px;">Failed to load messages</div>';
            }
        }

        // Image Upload Logic
        const fileInput = document.getElementById('fileInput');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const imagePreview = document.getElementById('imagePreview');
        document.getElementById('addFileBtn').addEventListener('click', () => fileInput.click());
        document.getElementById('removeImageBtn').addEventListener('click', () => {
            currentImageData = null;
            fileInput.value = "";
            imagePreviewContainer.style.display = 'none';
        });
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                currentImageData = event.target.result;
                imagePreview.src = currentImageData;
                imagePreviewContainer.style.display = 'block';
            };
            reader.readAsDataURL(file);
        });

        // Voice Logic
        const voiceBtn = document.getElementById('voiceBtn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            
            recognition.onstart = () => {
                voiceBtn.style.color = '#ef4444';
                messageInput.placeholder = "Listening...";
            };
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                messageInput.value = (messageInput.value + " " + transcript).trim();
                sendBtn.disabled = false;
            };
            recognition.onend = () => {
                voiceBtn.style.color = 'var(--text-secondary)';
                messageInput.placeholder = "Message Xynth...";
            };
            voiceBtn.addEventListener('click', () => recognition.start());
        } else {
            voiceBtn.style.display = 'none';
        }

        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            if (role === 'bot') {
                bubble.innerHTML = text ? marked.parse(text) : '';
                msgDiv.appendChild(bubble);
                
                // Add actions for bot
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'message-actions';
                
                const copyBtn = document.createElement('button');
                copyBtn.className = 'action-btn';
                copyBtn.title = "Copy";
                copyBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(bubble.innerText);
                    copyBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                    setTimeout(() => copyBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>', 2000);
                };
                
                const regenBtn = document.createElement('button');
                regenBtn.className = 'action-btn';
                regenBtn.title = "Regenerate";
                regenBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>';
                regenBtn.onclick = () => {
                    if (isGenerating) return;
                    msgDiv.remove(); // Remove current bot response
                    // Find and remove previous user message if needed, or just send lastUserMessage
                    if (lastUserMessage) {
                        messageInput.value = lastUserMessage;
                        send();
                    }
                };
                
                actionsDiv.appendChild(copyBtn);
                actionsDiv.appendChild(regenBtn);
                msgDiv.appendChild(actionsDiv);
            } else {
                bubble.textContent = text;
                msgDiv.appendChild(bubble);
                lastUserMessage = text; // Track last user message for regeneration
            }
            
            messagesContainer.appendChild(msgDiv);
            chatView.scrollTop = chatView.scrollHeight;
            return bubble;
        }

        function setGenerationUI() {
            isGenerating = true;
            sendBtn.disabled = false;
            sendBtn.classList.add('stop');
            sendIcon.style.display = 'none';
            stopIcon.style.display = 'block';
        }

        function stopGenerationUI() {
            isGenerating = false;
            sendBtn.classList.remove('stop');
            sendIcon.style.display = 'block';
            stopIcon.style.display = 'none';
            sendBtn.disabled = messageInput.value.trim() === '';
        }

        async function send() {
            const text = messageInput.value.trim();
            if (!text) return;
            
            document.getElementById('suggestions').style.display = 'none';

            messageInput.value = '';
            messageInput.style.height = 'auto';
            setGenerationUI();

            appendMessage('user', text);
            const botBubble = appendMessage('bot', '');
            botBubble.innerHTML = '<span style="opacity:0.5">Thinking...</span>';

            const model = modelSelector.value;
            abortController = new AbortController();
            
            // clear image UI
            const payloadImageData = currentImageData;
            if (currentImageData) {
                document.getElementById('removeImageBtn').click();
            }

            try {
                const headers = { 'Content-Type': 'application/json' };
                if (currentToken) headers['Authorization'] = `Bearer ${currentToken}`;

                const response = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ 
                        session_id: sessionId, 
                        chat_id: currentChatId,
                        message: text, 
                        model: model,
                        image_data: payloadImageData,
                        deep_dive: isDeepDive
                    }),
                    signal: abortController.signal
                });

                if (!response.ok) throw new Error("Network response was not ok");
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";
                let buffer = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop(); // keep the incomplete part in buffer
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.substring(6).trim();
                            if (!dataStr) continue;
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.type === 'token') {
                                    fullText += data.text;
                                    botBubble.innerHTML = marked.parse(fullText);
                                    chatView.scrollTop = chatView.scrollHeight;
                                } else if (data.type === 'status') {
                                    if (!fullText) {
                                        botBubble.innerHTML = `<div style="display:flex;align-items:center;gap:8px;opacity:0.7;font-style:italic;font-size:13px">
                                            <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--accent);animation:pulse 1s infinite"></span>
                                            ${data.text}</div>`;
                                    }
                                } else if (data.type === 'sources') {
                                    // Inject a sources panel after the answer renders
                                    botBubble.dataset.sources = JSON.stringify(data.sources);
                                } else if (data.type === 'images') {
                                    // Render images inline after the text
                                    const grid = document.createElement('div');
                                    grid.style.cssText = 'display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px';
                                    data.images.forEach(img => {
                                        const a = document.createElement('a');
                                        a.href = img.source || img.url;
                                        a.target = '_blank';
                                        a.innerHTML = `<img src="${img.url}" alt="${img.title}" style="width:100%;border-radius:8px;object-fit:cover;height:130px;border:1px solid var(--border)" onerror="this.parentElement.style.display='none'">`;
                                        grid.appendChild(a);
                                    });
                                    botBubble.appendChild(grid);
                                } else if (data.type === 'pdf') {
                                    // Show PDF download button
                                    const btn = document.createElement('a');
                                    btn.href = data.url;
                                    btn.download = (data.title || 'research') + '.pdf';
                                    btn.style.cssText = 'display:inline-flex;align-items:center;gap:8px;margin-top:12px;padding:8px 16px;background:linear-gradient(135deg,#7c5cfc,#5c8dfc);color:#fff;border-radius:8px;text-decoration:none;font-size:13px;font-weight:500';
                                    btn.innerHTML = '📄 Download PDF Report';
                                    botBubble.appendChild(btn);
                                } else if (data.type === 'chat_id') {
                                    currentChatId = data.id;
                                    loadChatHistory();
                                } else if (data.type === 'model') {
                                    modelSelector.value = data.name;
                                } else if (data.type === 'limit') {
                                    showLimitModal(data.unlock_utc, modelSelector.value);
                                    if (modelSelector.value === 'Xynth 1.5') modelSelector.value = 'Xynth 1.5 Turbo';
                                    if (!fullText) botBubble.innerHTML = '<span style="color:#ef4444">Message blocked due to daily limit.</span>';
                                } else if (data.type === 'error') {
                                    botBubble.innerHTML += `<br><span style="color:#ef4444">Error: ${data.text}</span>`;
                                } else if (data.type === 'done' && botBubble.dataset.sources) {
                                    // Append collapsible sources section
                                    try {
                                        const sources = JSON.parse(botBubble.dataset.sources);
                                        if (sources.length) {
                                            const sid = 'src_' + Date.now();
                                            const wrap = document.createElement('div');
                                            wrap.style.cssText = 'margin-top:14px;border-top:1px solid var(--border);padding-top:10px';
                                            wrap.innerHTML = `<button onclick="document.getElementById('${sid}').style.display=document.getElementById('${sid}').style.display==='none'?'flex':'none'; this.innerText = document.getElementById('${sid}').style.display==='none' ? '📚 ${sources.length} Sources — click to expand' : '📚 ${sources.length} Sources — click to collapse';" style="background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;padding:0">📚 ${sources.length} Sources — click to expand</button>
                                            <div id="${sid}" style="display:none;margin-top:8px;flex-direction:column;gap:4px">`
                                            + sources.map((s,i) => `<a href="${s.url}" target="_blank" style="font-size:12px;color:var(--text2);text-decoration:none;padding:4px 0;border-bottom:1px solid var(--border)">[${i+1}] ${s.title}</a>`).join('')
                                            + `</div>`;
                                            botBubble.appendChild(wrap);
                                        }
                                    } catch(e) {}
                                }
                            } catch (e) {
                                console.error("JSON parse error on SSE chunk", e, dataStr);
                            }
                        }
                    }
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    // Stopped by user, just leave text as is
                    if (fullText) botBubble.innerHTML = marked.parse(fullText);
                } else {
                    console.error(err);
                    botBubble.innerHTML = `<span style="color:#ef4444">Connection failed. Please try again.</span>`;
                }
            }
            stopGenerationUI();
        }

        // Limit Timer Logic
        let timerInterval = null;
        function showLimitModal(unlockIso, modelName) {
            document.getElementById('limitTitle').textContent = `${modelName} Limit Reached`;
            limitModal.classList.remove('hidden');
            
            const unlockDate = new Date(unlockIso);
            
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute:'2-digit', timeZoneName: 'short' };
            document.getElementById('limitDate').textContent = "Unlocks: " + unlockDate.toLocaleDateString(undefined, options);

            if (timerInterval) clearInterval(timerInterval);
            
            function updateTimer() {
                const now = new Date();
                const diff = unlockDate - now;
                if (diff <= 0) {
                    document.getElementById('countdownTimer').textContent = "00:00:00";
                    clearInterval(timerInterval);
                    return;
                }
                const h = Math.floor(diff / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById('countdownTimer').textContent = 
                    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('ServiceWorker registration successful');
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
