<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#6366f1" />
    <link rel="manifest" href="/manifest.json" />
    <title>Xynth AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root {
        --bg: #f8fafc;
        --bg-2: #ffffff;
        --panel: #ffffff;
        --panel-2: #f1f5f9;
        --line: #e2e8f0;
        --line-2: #cbd5e1;
        --text: #0f172a;
        --muted: #64748b;
        --muted-2: #94a3b8;
        --accent: #6366f1;
        --accent-2: #3b82f6;
        --accent-3: #ec4899;
        --user-bubble: linear-gradient(135deg, #6366f1, #3b82f6);
        --bot-bubble: #ffffff;
        --tool-bg: #f8fafc;
        --tool-border: #e2e8f0;
        --shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        --radius: 16px;
      }
      [data-theme="dark"] {
        --bg: #0f1117;
        --bg-2: #0f1117;
        --panel: #1a1f2e;
        --panel-2: #242938;
        --line: #2d3348;
        --line-2: #3a4060;
        --text: #e8eaf0;
        --muted: #8892a4;
        --muted-2: #5a6478;
        --bot-bubble: #1a1f2e;
        --tool-bg: #1a1f2e;
        --tool-border: #2d3348;
        --shadow: 0 10px 40px rgba(0,0,0,0.3);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        background: var(--bg-2);
        color: var(--text);
        font:
          15px/1.6 -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Inter,
          Roboto,
          sans-serif;
        overflow: hidden;
      }
      /* Scrollbars — always visible, cross-browser */
      html {
        scrollbar-width: auto;
        scrollbar-color: #e2e8f0 #ffffff;
      }
      .messages,
      .scroll-area {
        scrollbar-width: auto;
        scrollbar-color: #cbd5e1 #ffffff;
      }
      .messages::-webkit-scrollbar,
      .scroll-area::-webkit-scrollbar {
        width: 14px !important;
        height: 14px !important;
      }
      .messages::-webkit-scrollbar-track,
      .scroll-area::-webkit-scrollbar-track {
        background: #ffffff !important;
      }
      .messages::-webkit-scrollbar-thumb,
      .scroll-area::-webkit-scrollbar-thumb {
        background: #cbd5e1 !important;
        border-radius: 7px !important;
        border: 2px solid #ffffff !important;
        min-height: 40px;
      }
      .messages::-webkit-scrollbar-thumb:hover,
      .scroll-area::-webkit-scrollbar-thumb:hover {
        background: #7c5cff !important;
      }
      .app {
        display: flex;
        flex-direction: column;
        height: 100dvh;
        margin: 0 auto;
      }

      /* === SIDEBAR === */
      .sidebar {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(20px);
        border-right: 1px solid var(--line);
        padding: 18px 14px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        overflow: hidden;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
        font-size: 18px;
        letter-spacing: 0.2px;
        padding: 0 4px;
      }
      .brand .logo {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        display: grid;
        place-items: center;
        color: #fff;
        font-weight: 900;
        font-size: 18px;
        box-shadow: 0 6px 20px rgba(124, 92, 255, 0.4);
      }
      .brand small {
        display: block;
        font-size: 10px;
        color: var(--muted);
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-top: 2px;
      }

      .btn {
        appearance: none;
        border: 1px solid var(--line);
        background: var(--panel-2);
        color: var(--text);
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        font-size: 13.5px;
        text-align: left;
        transition: 0.15s;
        font-family: inherit;
        font-weight: 500;
      }
      .btn:hover {
        border-color: var(--accent);
        background: #e2e8f0;
      }
      .btn.primary {
        background: linear-gradient(135deg, var(--accent), #5b8cff);
        border-color: transparent;
        color: #fff;
        text-align: center;
        font-weight: 600;
      }
      .btn.primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(124, 92, 255, 0.4);
      }

      .section-title {
        color: var(--muted);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        margin: 8px 6px 4px;
        font-weight: 600;
      }

      .scroll-area {
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding-right: 4px;
        min-height: 0;
      }

      .model-item {
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 13px;
        color: var(--muted);
        border: 1px solid transparent;
        transition: 0.15s;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .model-item:hover {
        background: var(--panel-2);
        color: var(--text);
      }
      .model-item.active {
        background: linear-gradient(
          135deg,
          rgba(124, 92, 255, 0.15),
          rgba(34, 211, 238, 0.08)
        );
        color: var(--text);
        border-color: rgba(124, 92, 255, 0.5);
      }
      .model-item .row1 {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
      }
      .model-item .name {
        font-weight: 600;
        font-size: 12.5px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .model-item .pct {
        font-size: 10px;
        color: var(--muted-2);
        font-variant-numeric: tabular-nums;
      }
      .bar {
        height: 4px;
        background: #1a2032;
        border-radius: 2px;
        overflow: hidden;
      }
      .bar > i {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        border-radius: 2px;
        transition: width 0.4s ease;
      }
      .bar > i.warn {
        background: linear-gradient(90deg, #fbbf24, #fb923c);
      }
      .bar > i.danger {
        background: linear-gradient(90deg, #f43f5e, #ec4899);
      }

      .footer {
        margin-top: auto;
        color: var(--muted);
        font-size: 11px;
        text-align: center;
        padding-top: 8px;
        border-top: 1px solid var(--line);
      }

      /* === MAIN === */
      .main {
        display: flex;
        flex-direction: column;
        min-width: 0;
        background: var(--bg);
        height: 100dvh;
        overflow: hidden;
      }
      .topbar {
        padding: 14px 24px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(248, 250, 252, 0.5);
        backdrop-filter: blur(12px);
      }
      .topbar h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #10b981;
        box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        50% {
          box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
        }
      }
      .pill {
        font-size: 11.5px;
        padding: 5px 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }

      .messages {
        flex: 1;
        overflow-y: scroll;
        padding: 70px 0 12px;
        min-height: 0;
      }
      .empty {
        max-width: 680px;
        margin: 10vh auto 0;
        text-align: center;
        padding: 0 16px;
      }
      .empty h2 {
        font-size: 32px;
        margin: 0 0 10px;
        background: linear-gradient(135deg, var(--text), #a5b4fc);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-weight: 700;
      }
      .empty p {
        color: var(--muted);
        margin: 0 0 30px;
      }
      .suggest {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .suggest div {
        border: 1px solid var(--line);
        background: var(--panel);
        padding: 14px;
        border-radius: 12px;
        cursor: pointer;
        text-align: left;
        font-size: 13.5px;
        color: var(--text);
        transition: 0.15s;
      }
      .suggest div:hover {
        border-color: var(--accent);
        background: var(--panel-2);
        transform: translateY(-2px);
      }
      .suggest div .icon {
        font-size: 18px;
        margin-bottom: 6px;
        display: block;
      }

      /* Message bubbles */
      .msg {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto 18px;
        padding: 0 20px;
        display: flex;
        gap: 12px;
        animation: slide-in 0.3s ease-out;
      }
      @keyframes slide-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .msg.user {
        justify-content: flex-start;
        flex-direction: row-reverse;
      }
      .msg.bot {
        justify-content: flex-start;
      }
      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 10px;
        flex-shrink: 0;
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 13px;
      }
      .avatar.user {
        background: linear-gradient(135deg, #5b8cff, #7c5cff);
        color: #fff;
      }
      .avatar.bot {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff;
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      }
      .bubble-wrap {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: 82%;
        min-width: 0;
      }
      .msg.user .bubble-wrap {
        align-items: flex-end;
      }
      .bubble {
        padding: 12px 16px;
        border-radius: 16px;
        word-wrap: break-word;
        font-size: 14.5px;
        line-height: 1.6;
        overflow-x: auto;
        max-width: 100%;
      }
      .msg.user .bubble {
        background: var(--user-bubble);
        color: #fff;
        border-bottom-right-radius: 4px;
      }
      .msg.bot .bubble {
        background: var(--bot-bubble);
        border: 1px solid var(--line);
        border-bottom-left-radius: 4px;
        backdrop-filter: blur(10px);
      }
      .bubble :is(p, ul, ol) {
        margin: 0 0 8px;
      }
      .bubble :is(p, ul, ol):last-child {
        margin-bottom: 0;
      }
      .bubble code {
        background: rgba(0, 0, 0, 0.05);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 13px;
        font-family: ui-monospace, Menlo, Consolas, monospace;
      }
      .msg.user .bubble code {
        background: rgba(0, 0, 0, 0.15);
      }
      .bubble pre {
        background: #1e293b;
        color: #f8fafc;
        padding: 12px;
        border-radius: 8px;
        overflow-x: auto;
        border: 1px solid var(--line);
        margin: 8px 0;
      }
      .bubble pre code {
        background: transparent;
        padding: 0;
      }
      .bubble a {
        color: var(--accent-2);
        text-decoration: none;
      }
      .bubble a:hover {
        text-decoration: underline;
      }
      .bubble img {
        max-width: 100%;
        border-radius: 10px;
        display: block;
        margin: 6px 0;
      }
      .bubble h1,
      .bubble h2,
      .bubble h3 {
        margin: 10px 0 6px;
        font-weight: 700;
      }
      .bubble blockquote {
        border-left: 3px solid var(--accent);
        padding-left: 10px;
        color: var(--muted);
        margin: 8px 0;
      }
      .bubble table {
        width: 100%;
        border-collapse: collapse;
        margin: 10px 0;
        white-space: nowrap;
      }
      .bubble th,
      .bubble td {
        border: 1px solid var(--line-2);
        padding: 8px 12px;
        text-align: left;
      }
      .bubble th {
        background: rgba(0, 0, 0, 0.2);
        font-weight: 600;
        color: var(--accent-2);
      }

      /* Tool indicators */
      .tools-strip {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .tool-chip {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--tool-bg);
        border: 1px solid var(--tool-border);
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 12.5px;
        color: var(--muted);
        animation: slide-in 0.25s ease-out;
      }
      .tool-chip.active {
        border-color: rgba(124, 92, 255, 0.5);
        color: var(--text);
        background: linear-gradient(
          90deg,
          rgba(124, 92, 255, 0.1),
          rgba(34, 211, 238, 0.05)
        );
      }
      .tool-chip.done {
        opacity: 0.7;
      }
      .tool-chip .ti {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }
      .tool-chip .name {
        font-weight: 600;
        color: var(--text);
      }
      .tool-chip .args {
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 480px;
        font-family: ui-monospace, Menlo, Consolas, monospace;
        font-size: 11.5px;
      }
      .spinner {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid rgba(124, 92, 255, 0.3);
        border-top-color: var(--accent);
        animation: spin 1s linear infinite;
        flex-shrink: 0;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .check {
        color: #10b981;
        font-size: 14px;
        flex-shrink: 0;
      }

      /* Scroll to bottom button */
      .scroll-btn {
        position: fixed; bottom: 100px; right: 20px;
        width: 36px; height: 36px; border-radius: 50%;
        background: var(--panel); border: 1px solid var(--line);
        box-shadow: var(--shadow); cursor: pointer;
        display: none; align-items: center; justify-content: center;
        color: var(--muted); transition: 0.15s; z-index: 50;
      }
      .scroll-btn.visible { display: flex; }
      .scroll-btn:hover { background: var(--panel-2); color: var(--text); }
      .scroll-btn svg { width: 18px; height: 18px; }

      /* Image upload preview */
      .img-preview-wrap {
        padding: 8px 10px 0;
        display: flex; gap: 8px; flex-wrap: wrap;
      }
      .img-preview-item {
        position: relative; width: 60px; height: 60px;
      }
      .img-preview-item img {
        width: 100%; height: 100%; object-fit: cover;
        border-radius: 8px; border: 1px solid var(--line);
      }
      .img-preview-item .rm {
        position: absolute; top: -6px; right: -6px;
        width: 18px; height: 18px; border-radius: 50%;
        background: #f43f5e; color: #fff; border: none;
        font-size: 11px; cursor: pointer; display: grid; place-items: center;
      }

      /* Stop/dark-mode buttons in composer */
      .stop-btn {
        appearance: none; border: 0; background: #f43f5e;
        color: #fff; border-radius: 12px; height: 40px; width: 42px;
        display: none; place-items: center; cursor: pointer;
        flex-shrink: 0; transition: 0.15s;
      }
      .stop-btn.visible { display: grid; }
      .stop-btn svg { width: 16px; height: 16px; }
      .stop-btn:hover { background: #e11d48; }

      /* Dark mode toggle */
      .darkmode-btn {
        position: absolute; top: 20px; right: 72px;
        width: 40px; height: 40px; border-radius: 8px;
        background: transparent; border: none;
        display: grid; place-items: center; cursor: pointer;
        color: var(--text); z-index: 100; transition: background 0.15s;
      }
      .darkmode-btn:hover { background: var(--line); }
      .darkmode-btn svg { width: 20px; height: 20px; }

      /* Copy action bar */
      .msg-actions {
        display: flex;
        gap: 6px;
        margin-top: 2px;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .msg.bot:hover .msg-actions { opacity: 1; }
      .msg-actions button {
        background: none;
        border: 1px solid var(--line);
        border-radius: 7px;
        padding: 4px 10px;
        font-size: 12px;
        color: var(--muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: 0.15s;
        font-family: inherit;
      }
      .msg-actions button:hover {
        background: var(--panel-2);
        color: var(--text);
        border-color: var(--accent);
      }
      .msg-actions button.copied {
        color: #10b981;
        border-color: #10b981;
      }

      /* Image generation placeholder */
      .image-loader {
        width: 280px;
        height: 280px;
        border-radius: 12px;
        background: linear-gradient(
          135deg,
          rgba(124, 92, 255, 0.08),
          rgba(34, 211, 238, 0.05)
        );
        border: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin: 6px 0;
        position: relative;
        overflow: hidden;
      }
      .image-loader::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          110deg,
          transparent 30%,
          rgba(124, 92, 255, 0.2) 50%,
          transparent 70%
        );
        animation: shimmer 1.6s infinite;
      }
      @keyframes shimmer {
        from {
          transform: translateX(-100%);
        }
        to {
          transform: translateX(100%);
        }
      }
      .image-loader .spinner {
        width: 34px;
        height: 34px;
        border-width: 3px;
      }
      .image-loader .label {
        color: var(--muted);
        font-size: 13px;
        z-index: 1;
      }

      /* Typing dots (initial wait) */
      .typing {
        display: inline-flex;
        gap: 4px;
        padding: 4px 0;
      }
      .typing span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        animation: bounce 1.2s infinite ease-in-out;
      }
      .typing span:nth-child(2) {
        animation-delay: 0.15s;
        background: #5b8cff;
      }
      .typing span:nth-child(3) {
        animation-delay: 0.3s;
        background: var(--accent-2);
      }
      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        40% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }

      /* === COMPOSER === */
      .composer {
        padding: 14px 22px 20px;
        border-top: 1px solid var(--line);
        background: rgba(248, 250, 252, 0.7);
        backdrop-filter: blur(10px);
      }
      .composer-inner {
        max-width: 860px;
        margin: 0 auto;
        background: var(--panel);
        border: 1px solid var(--line-2);
        border-radius: 18px;
        padding: 8px;
        display: flex;
        align-items: flex-end;
        gap: 8px;
        box-shadow: var(--shadow);
        transition: 0.2s;
      }
      .composer-inner:focus-within {
        border-color: var(--accent);
        box-shadow:
          0 0 0 3px rgba(124, 92, 255, 0.15),
          var(--shadow);
      }
      textarea {
        flex: 1;
        background: transparent;
        border: 0;
        outline: 0;
        color: var(--text);
        resize: none;
        font: inherit;
        padding: 10px 10px;
        max-height: 180px;
        min-height: 24px;
        line-height: 1.5;
      }
      textarea::placeholder {
        color: var(--muted-2);
      }
      .send,
      .mic {
        appearance: none;
        border: 0;
        color: #fff;
        font-weight: 700;
        border-radius: 12px;
        padding: 0 14px;
        cursor: pointer;
        height: 40px;
        width: 42px;
        display: grid;
        place-items: center;
        transition: 0.15s;
        flex-shrink: 0;
      }
      .send {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
      }
      .send:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
      }
      .mic {
        background: #f1f5f9;
        color: var(--text);
        border: 1px solid var(--line-2);
      }
      .mic:hover {
        background: #252c40;
        border-color: var(--accent);
      }
      .mic.recording {
        background: linear-gradient(135deg, #f43f5e, #ec4899);
        color: #fff;
        border-color: transparent;
        animation: rec-pulse 1.2s infinite;
      }
      @keyframes rec-pulse {
        50% {
          box-shadow: 0 0 0 8px rgba(244, 63, 94, 0);
        }
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.5);
        }
      }
      .mic.transcribing {
        background: #1c2230;
        color: var(--accent);
      }
      .send:disabled,
      .mic:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }
      .send svg,
      .mic svg {
        width: 18px;
        height: 18px;
      }
      .hint {
        color: var(--muted-2);
        font-size: 11px;
        text-align: center;
        margin-top: 8px;
      }

      @media (max-width: 780px) {
        .app {
          grid-template-columns: 1fr;
          overflow: hidden;
        }
        .sidebar { display: none; }
        .msg { padding: 0 12px; margin-bottom: 14px; }
        .bubble-wrap { max-width: calc(100% - 44px); min-width: 0; }
        .bubble { font-size: 14px; padding: 10px 13px; }
        .empty { margin: 8vh auto 0; }
        .empty h2 { font-size: 22px; }
        .empty p { font-size: 13.5px; }
        .suggest { grid-template-columns: 1fr; }
        .suggest div { padding: 11px 12px; font-size: 13px; }
        .composer { padding: 8px 10px max(12px, env(safe-area-inset-bottom)); }
        .composer-inner { border-radius: 14px; }
        textarea { font-size: 16px; padding: 8px 10px; } /* 16px prevents iOS zoom */
        .send, .mic { height: 38px; width: 38px; }
        .hint { font-size: 10px; }
        .history-btn { left: 12px; top: 12px; width: 36px; height: 36px; }
        .profile-btn { right: 12px; top: 12px; width: 36px; height: 36px; }
        .messages { padding: 58px 0 8px; scrollbar-width: none; }
        .messages::-webkit-scrollbar { display: none; }
        .auth-box { width: calc(100% - 40px); padding: 24px 20px; }
        .side-menu { width: 260px; }
      }

      @media (max-width: 380px) {
        .empty h2 { font-size: 18px; }
        .bubble { font-size: 13.5px; }
        .suggest div { font-size: 12.5px; }
      }
      
      .profile-btn {
        position: absolute;
        top: 20px;
        right: 24px;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--panel-2);
        border: 1px solid var(--line);
        display: grid;
        place-items: center;
        cursor: pointer;
        color: var(--text);
        transition: 0.15s;
        z-index: 100;
      }
      .profile-btn:hover { background: var(--line); }
      .profile-btn svg { width: 20px; height: 20px; }
      
      .side-menu {
        position: fixed; left: -300px; top: 0; bottom: 0; width: 280px;
        background: var(--panel); border-right: 1px solid var(--line);
        z-index: 200; transition: left 0.3s ease; display: flex;
        flex-direction: column; padding: 16px; box-shadow: var(--shadow);
      }
      .side-menu.open { left: 0; }
      .side-menu h3 { margin: 0 0 16px; font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
      .side-menu .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); }
      .side-menu .new-chat { width: 100%; padding: 10px; border-radius: 8px; background: var(--panel-2); border: 1px solid var(--line); text-align: left; cursor: pointer; font-weight: 500; font-size: 14px; margin-bottom: 16px; }
      .side-menu .new-chat:hover { background: var(--line); }
      .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
      .chat-item { padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
      .chat-item:hover { background: var(--panel-2); }
      
      .history-btn {
        position: absolute; top: 20px; left: 24px; width: 40px; height: 40px;
        border-radius: 8px; background: transparent; border: none;
        display: grid; place-items: center; cursor: pointer; color: var(--text);
        z-index: 100; transition: background 0.15s;
      }
      .history-btn:hover { background: var(--line); }
      .history-btn svg { width: 24px; height: 24px; }
      
      .auth-modal {
        position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
        z-index: 1000; display: flex; align-items: center; justify-content: center;
      }
      .auth-modal.hidden { display: none; }
      .auth-box {
        background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
        padding: 30px; width: 340px; box-shadow: var(--shadow); text-align: center;
      }
      .auth-box h2 { margin: 0 0 10px; font-size: 22px; }
      .auth-box p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
      .auth-box input {
        width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px;
        border: 1px solid var(--line); background: var(--bg); color: var(--text); outline: none;
      }
      .auth-box input:focus { border-color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="auth-modal hidden" id="authModal">
      <div class="auth-box" style="position:relative;">
        <button id="closeAuth" style="position:absolute; top:10px; right:15px; background:none; border:none; font-size:20px; cursor:pointer; color:var(--muted);">&times;</button>
        <h2>Welcome to Xynth AI</h2>
        <p>Sign in or create an account to save your chats.</p>
        <input type="email" id="authEmail" placeholder="Email address" />
        <input type="password" id="authPassword" placeholder="Password" />
        <button class="btn send" id="authSignIn" style="width: 100%; margin-top: 10px; border: none; color: white;">Sign In</button>
        <button class="btn" id="authSignUp" style="width: 100%; margin-top: 10px;">Create Account</button>
        <div id="authError" style="color: #f87171; margin-top: 10px; font-size: 13px;"></div>
      </div>
    </div>
    <div class="side-menu" id="sideMenu">
      <h3>Chat History <button class="close-btn" id="closeMenu">&times;</button></h3>
      <button class="new-chat" id="sideNewChat">＋ New Chat</button>
      <div class="chat-list" id="chatList">
        <div class="chat-item">Current Session</div>
      </div>
    </div>
    <div class="app">
      <main class="main">
        <button class="history-btn" title="Chat History" id="historyBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <button class="darkmode-btn" id="darkmodeBtn" title="Toggle dark mode">
          <svg id="darkIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="profile-btn" title="Account Profile" id="profileBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </button>
        <div class="messages" id="messages">
          <div class="empty" id="empty">
            <h2 id="greetingText">What can I do for you today?</h2>
            <p>
              I can search the web, read pages, generate images, send emails,
              schedule reminders, and more.
            </p>
            <div class="suggest" id="suggestContainer">
              <!-- Randomized suggestions will be injected here by JS -->
            </div>
          </div>
        </div>
        <div class="composer">
          <div id="imgPreviewWrap" class="img-preview-wrap" style="display:none;"></div>
          <div class="composer-inner">
            <label for="imgUpload" style="display:grid;place-items:center;width:34px;height:34px;cursor:pointer;color:var(--muted);flex-shrink:0;border-radius:8px;transition:0.15s;" title="Attach image">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </label>
            <input type="file" id="imgUpload" accept="image/*" multiple style="display:none;" />
            <textarea
              id="input"
              placeholder="Message Xynth…  (Shift+Enter for newline)"
              rows="1"
            ></textarea>
            <button class="stop-btn" id="stopBtn" title="Stop generating">
              <svg viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
            </button>
            <button class="mic" id="mic" title="Hold or click to talk">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v20M17 5v14M7 5v14M22 10v4M2 10v4"/>
              </svg>
            </button>
            <button class="send" id="send" title="Send (Enter)">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.4"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M5 12h14M13 6l6 6-6 6" />
              </svg>
            </button>
          </div>
          <div class="hint">
            Enter to send · Shift+Enter for newline · 🎙️ Voice · 🖼️ Attach image
          </div>
        </div>
      </main>
    </div>
    <button class="scroll-btn" id="scrollBtn" title="Scroll to bottom">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>

    <script>
      const SUPABASE_URL = "https://ujlqigpwoaewdrylesxg.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqbHFpZ3B3b2Fld2RyeWxlc3hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MTk4NDcsImV4cCI6MjA5MzA5NTg0N30.zmcXsds_nFWjpPdh9V_RtpMV3HNrR4Dgk9VsuZ8Jd8Y";
      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      
      let currentUser = null;
      let chatSaved = false;

      const sessionId =
        localStorage.getItem("xynth_session") ||
        "web-" + Math.random().toString(36).slice(2, 10);
      localStorage.setItem("xynth_session", sessionId);

      const $ = (s) => document.querySelector(s);
      
      // Supabase Auth Handling
      supabaseClient.auth.onAuthStateChange((event, session) => {
        if (session) {
          currentUser = session.user;
          $("#authModal").classList.add("hidden");
          loadChatHistory();
        } else {
          currentUser = null;
          // Do not automatically show the modal anymore!
          $("#chatList").innerHTML = '<div class="chat-item">Current Session</div>';
        }
      });

      $("#closeAuth").addEventListener("click", () => {
        $("#authModal").classList.add("hidden");
      });

      $("#authSignIn").addEventListener("click", async () => {
        const email = $("#authEmail").value;
        const password = $("#authPassword").value;
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) $("#authError").textContent = error.message;
      });

      $("#authSignUp").addEventListener("click", async () => {
        const email = $("#authEmail").value;
        const password = $("#authPassword").value;
        const { error } = await supabaseClient.auth.signUp({ email, password });
        if (error) $("#authError").textContent = error.message;
        else $("#authError").textContent = "Account created! Check email or sign in.";
      });

      $("#profileBtn").addEventListener("click", async () => {
        if (currentUser) {
          if (confirm("Sign out of your account?")) {
            await supabaseClient.auth.signOut();
          }
        } else {
          $("#authModal").classList.remove("hidden");
        }
      });

      async function loadChatHistory() {
        if (!currentUser) return;
        const { data, error } = await supabaseClient.from('chats').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
        if (data) {
          const chatList = $("#chatList");
          chatList.innerHTML = "";
          data.forEach(chat => {
            const div = document.createElement("div");
            div.className = "chat-item";
            div.textContent = chat.title;
            if (chat.id === sessionId) div.style.background = "var(--panel-2)";
            div.addEventListener("click", () => {
              localStorage.setItem("xynth_session", chat.id);
              location.reload();
            });
            chatList.appendChild(div);
          });
        }
      }

      const messagesEl = $("#messages"),
        emptyEl = $("#empty");
      const inputEl = $("#input"),
        sendBtn = $("#send");
      const modelListEl = $("#modelList"),
        activeModelEl = $("#activeModel");

      marked.setOptions({ breaks: true, gfm: true });

      function escapeHtml(s) {
        return s.replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );
      }

      function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      // Scroll-to-bottom button
      const scrollBtn = $("#scrollBtn");
      messagesEl.addEventListener("scroll", () => {
        const distFromBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight;
        scrollBtn.classList.toggle("visible", distFromBottom > 200);
      });
      scrollBtn.addEventListener("click", scrollToBottom);

      // Dark mode
      const darkmodeBtn = $("#darkmodeBtn");
      const savedTheme = localStorage.getItem("xynth_theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);
      function updateDarkIcon() {
        const isDark = document.documentElement.getAttribute("data-theme") === "dark";
        $("#darkIcon").innerHTML = isDark
          ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
          : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
      }
      updateDarkIcon();
      darkmodeBtn.addEventListener("click", () => {
        const isDark = document.documentElement.getAttribute("data-theme") === "dark";
        const next = isDark ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("xynth_theme", next);
        updateDarkIcon();
      });

      // Image upload preview
      const imgUploadEl = $("#imgUpload");
      const imgPreviewWrap = $("#imgPreviewWrap");
      let attachedImages = [];
      imgUploadEl.addEventListener("change", () => {
        Array.from(imgUploadEl.files).forEach(file => {
          const reader = new FileReader();
          reader.onload = e => {
            const id = Date.now() + Math.random();
            attachedImages.push({ id, dataUrl: e.target.result, file });
            const item = document.createElement("div");
            item.className = "img-preview-item";
            item.dataset.id = id;
            item.innerHTML = `<img src="${e.target.result}" /><button class="rm" title="Remove">&times;</button>`;
            item.querySelector(".rm").addEventListener("click", () => {
              attachedImages = attachedImages.filter(i => i.id != id);
              item.remove();
              if (!attachedImages.length) imgPreviewWrap.style.display = "none";
            });
            imgPreviewWrap.appendChild(item);
            imgPreviewWrap.style.display = "flex";
          };
          reader.readAsDataURL(file);
        });
        imgUploadEl.value = "";
      });

      // Stop generation
      const stopBtn = $("#stopBtn");
      let activeEventSource = null;
      stopBtn.addEventListener("click", () => {
        if (activeEventSource) { activeEventSource.close(); activeEventSource = null; }
        stopBtn.classList.remove("visible");
        sendBtn.disabled = false;
      });

      // Friendly labels for each tool
      const TOOL_LABELS = {
        web_search: ["🔎", "Searching the web"],
        scrape_website: ["📄", "Reading the page"],
        browser_open: ["🌐", "Opening browser"],
        browser_get_html: ["📋", "Reading page content"],
        browser_click: ["👆", "Clicking"],
        browser_type: ["⌨️", "Typing"],
        analyze_webpage_visually: ["👁️", "Looking at the page"],
        generate_image: ["🎨", "Painting an image"],
        send_whatsapp_image: ["📤", "Sending image"],
        screenshot_and_send: ["📸", "Taking a screenshot"],
        send_email: ["✉️", "Sending email"],
        execute_python_code: ["🐍", "Running code"],
        save_text_to_file: ["💾", "Saving file"],
        call_api: ["🔌", "Calling API"],
        schedule_recurring_task: ["⏰", "Scheduling task"],
        schedule_one_time_task: ["⏰", "Scheduling task"],
        list_scheduled_tasks: ["📋", "Listing tasks"],
        cancel_scheduled_task: ["❌", "Cancelling task"],
      };
      function toolLabel(name) {
        return TOOL_LABELS[name] || ["🔧", name];
      }
      function shortArgs(args) {
        if (!args || typeof args !== "object") return "";
        const parts = [];
        for (const [k, v] of Object.entries(args)) {
          let s = typeof v === "string" ? v : JSON.stringify(v);
          if (s.length > 60) s = s.slice(0, 57) + "…";
          parts.push(s);
        }
        return parts.join(" · ");
      }

      function appendUserMessage(text) {
        if (emptyEl) emptyEl.remove();
        const msg = document.createElement("div");
        msg.className = "msg user";
        msg.innerHTML = `
    <div class="avatar user">U</div>
    <div class="bubble-wrap"><div class="bubble"></div></div>`;
        msg.querySelector(".bubble").textContent = text;
        messagesEl.appendChild(msg);
        scrollToBottom();
      }

      function appendBotMessage() {
        if (emptyEl) emptyEl.remove();
        const msg = document.createElement("div");
        msg.className = "msg bot";
        msg.innerHTML = `
    <div class="avatar bot">X</div>
    <div class="bubble-wrap">
      <div class="tools-strip"></div>
      <div class="bubble"><span class="typing"><span></span><span></span><span></span></span></div>
    </div>`;
        messagesEl.appendChild(msg);
        scrollToBottom();
        return {
          bubble: msg.querySelector(".bubble"),
          tools: msg.querySelector(".tools-strip"),
          wrap: msg.querySelector(".bubble-wrap"),
          msg,
        };
      }

      function addToolChip(toolsEl, name, args) {
        const [emoji, label] = toolLabel(name);
        const chip = document.createElement("div");
        chip.className = "tool-chip active";
        chip.dataset.tool = name;
        chip.innerHTML = `
    <div class="spinner"></div>
    <span class="name">${emoji} ${escapeHtml(label)}</span>
    <span class="args">${escapeHtml(shortArgs(args))}</span>`;
        toolsEl.appendChild(chip);
        scrollToBottom();
        return chip;
      }

      function completeToolChip(chip) {
        if (!chip) return;
        chip.classList.remove("active");
        chip.classList.add("done");
        const sp = chip.querySelector(".spinner");
        if (sp) sp.outerHTML = '<span class="check">✓</span>';
      }

      function addImagePlaceholder(wrap) {
        const ph = document.createElement("div");
        ph.className = "image-loader";
        ph.innerHTML = `<div class="spinner"></div><div class="label">Painting your image…</div>`;
        // Insert before the bubble
        wrap.insertBefore(ph, wrap.querySelector(".bubble"));
        scrollToBottom();
        return ph;
      }

      function replacePlaceholderWithImage(ph, url) {
        if (!ph) return;
        const img = document.createElement("img");
        img.src = url;
        img.alt = "Generated image";
        img.style.maxWidth = "420px";
        img.style.borderRadius = "12px";
        img.style.margin = "6px 0";
        img.onload = scrollToBottom;
        ph.replaceWith(img);
      }

      async function send(overrideText) {
        const text = overrideText || inputEl.value.trim();
        if (!text && !attachedImages.length) return;
        inputEl.value = "";
        inputEl.style.height = "auto";
        sendBtn.disabled = true;
        stopBtn.classList.add("visible");

        appendUserMessage(text);
        // Clear attached images
        attachedImages = [];
        imgPreviewWrap.innerHTML = "";
        imgPreviewWrap.style.display = "none";

        const ui = appendBotMessage();


        if (!chatSaved && currentUser) {
          chatSaved = true;
          const title = text.slice(0, 40) + (text.length > 40 ? "..." : "");
          supabaseClient.from('chats').insert([{ id: sessionId, user_id: currentUser.id, title }])
            .then(() => loadChatHistory());
        }

        const activeChips = {};
        let pendingImagePlaceholder = null;
        let firstTextReceived = false;
        let toolCount = 0;

        const url = `/chat/stream?session_id=${encodeURIComponent(sessionId)}&message=${encodeURIComponent(text)}`;
        const es = new EventSource(url);
        activeEventSource = es;

        es.onmessage = (ev) => {
          let evt;
          try {
            evt = JSON.parse(ev.data);
          } catch {
            return;
          }

          if (evt.type === "tool_start") {
            // If this is generate_image, also drop an image placeholder into the bubble area
            if (evt.name === "generate_image") {
              pendingImagePlaceholder = addImagePlaceholder(ui.wrap);
            }
            ui.tools.innerHTML = ""; // Clear any previous tool to show one by one
            toolCount++;
            const chip = addToolChip(ui.tools, evt.name, evt.args);
            activeChips[evt.name] = chip;
          } else if (evt.type === "tool_end") {
            if (activeChips[evt.name]) {
              activeChips[evt.name].remove(); // Remove immediately after it's done
              delete activeChips[evt.name];
            }
            // If image URL came back, swap the placeholder
            if (evt.image_url && pendingImagePlaceholder) {
              replacePlaceholderWithImage(
                pendingImagePlaceholder,
                "/proxy/image?url=" + encodeURIComponent(evt.image_url),
              );
              pendingImagePlaceholder = null;
            }
          } else if (evt.type === "image") {
            if (pendingImagePlaceholder) {
              replacePlaceholderWithImage(pendingImagePlaceholder, "/proxy/image?url=" + encodeURIComponent(evt.url));
              pendingImagePlaceholder = null;
            }
          } else if (evt.type === "text") {
            if (!firstTextReceived) {
              ui.bubble.innerHTML = "";
              firstTextReceived = true;
              const profileBtn = $("#profileBtn");
              if (profileBtn) profileBtn.style.display = "none";
            }
            ui.bubble.innerHTML = marked.parse(evt.content || "");
            scrollToBottom();
          } else if (evt.type === "usage") {
            loadUsage(); // refresh sidebar bars
          } else if (evt.type === "status" && evt.stage === "fallback") {
            const note = document.createElement("div");
            note.className = "tool-chip done";
            note.innerHTML = `<span class="name">↻ Switched: ${escapeHtml(evt.from)} → ${escapeHtml(evt.to)}</span>`;
            ui.tools.appendChild(note);
          } else if (evt.type === "error") {
            if (!firstTextReceived) {
              ui.bubble.innerHTML = "";
              firstTextReceived = true;
            }
            ui.bubble.innerHTML += `<div style="color:#f87171">⚠️ ${escapeHtml(evt.message)}</div>`;
          } else if (evt.type === "done") {
            es.close();
            activeEventSource = null;
            sendBtn.disabled = false;
            stopBtn.classList.remove("visible");
            if (!firstTextReceived) {
              ui.bubble.innerHTML =
                '<em style="color:var(--muted)">(no text reply — check tool results above)</em>';
            }
            
            // Clear tools and add summary
            ui.tools.innerHTML = "";
            if (toolCount > 0) {
              ui.tools.innerHTML = `<div style="font-size: 11.5px; color: var(--muted-2); margin-bottom: 8px; margin-left: 4px; font-weight: 500;">✓ Completed ${toolCount} background task${toolCount !== 1 ? 's' : ''}</div>`;
            }
            if (pendingImagePlaceholder) {
              pendingImagePlaceholder.remove();
              pendingImagePlaceholder = null;
            }
            inputEl.focus();
            loadUsage();
            // Read the final reply out loud if user enabled it
            if (firstTextReceived) speak(ui.bubble.innerText);
            // Add copy button
            if (firstTextReceived) {
              const actions = document.createElement("div");
              actions.className = "msg-actions";
              actions.innerHTML = `
                <button class="copy-btn" title="Copy response">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2"/>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                  </svg>
                  Copy
                </button>`;
              actions.querySelector(".copy-btn").addEventListener("click", function() {
                navigator.clipboard.writeText(ui.bubble.innerText).then(() => {
                  this.classList.add("copied");
                  this.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
                  setTimeout(() => {
                    this.classList.remove("copied");
                    this.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
                  }, 2000);
                });
              });
              ui.wrap.appendChild(actions);
              // Add regenerate button
              const regenBtn = document.createElement("button");
              regenBtn.title = "Regenerate response";
              regenBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Regenerate`;
              regenBtn.addEventListener("click", () => {
                const lastUserMsg = [...document.querySelectorAll(".msg.user .bubble")].slice(-1)[0];
                if (lastUserMsg) {
                  ui.msg.remove();
                  send(lastUserMsg.textContent);
                }
              });
              actions.appendChild(regenBtn);
              // Export button
              const exportBtn = document.createElement("button");
              exportBtn.title = "Export chat";
              exportBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export`;
              exportBtn.addEventListener("click", () => {
                const msgs = [...document.querySelectorAll(".msg")].map(m => {
                  const who = m.classList.contains("user") ? "You" : "Xynth";
                  return `${who}:\n${m.querySelector(".bubble").innerText}`;
                }).join("\n\n---\n\n");
                const blob = new Blob([msgs], { type: "text/plain" });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = `xynth-chat-${new Date().toISOString().slice(0,10)}.txt`;
                a.click();
              });
              actions.appendChild(exportBtn);
            }
          }
        };

        es.onerror = () => {
          es.close();
          activeEventSource = null;
          sendBtn.disabled = false;
          stopBtn.classList.remove("visible");
          if (!firstTextReceived) {
            ui.bubble.innerHTML =
              '<span style="color:#f87171">Connection lost. Try again.</span>';
          }
        };
      }

      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });
      inputEl.addEventListener("input", () => {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + "px";
      });
      sendBtn.addEventListener("click", send);

      // === Voice input (mic button) ===
      const micBtn = $("#mic");
      let mediaRecorder = null,
        audioChunks = [],
        micStream = null;

      async function startRecording() {
        try {
          micStream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
        } catch (e) {
          alert("Microphone access denied or unavailable: " + e.message);
          return;
        }
        audioChunks = [];
        // Pick a mime type the browser supports
        let mime = "";
        for (const t of [
          "audio/webm;codecs=opus",
          "audio/webm",
          "audio/ogg;codecs=opus",
          "audio/mp4",
        ]) {
          if (window.MediaRecorder && MediaRecorder.isTypeSupported(t)) {
            mime = t;
            break;
          }
        }
        mediaRecorder = new MediaRecorder(
          micStream,
          mime ? { mimeType: mime } : undefined,
        );
        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };
        mediaRecorder.onstop = onRecordingStop;
        mediaRecorder.start();
        micBtn.classList.add("recording");
        micBtn.title = "Click to stop";
      }

      function stopRecording() {
        if (!mediaRecorder || mediaRecorder.state === "inactive") return;
        mediaRecorder.stop();
        micStream && micStream.getTracks().forEach((t) => t.stop());
        micBtn.classList.remove("recording");
        micBtn.classList.add("transcribing");
        micBtn.disabled = true;
      }

      async function onRecordingStop() {
        const blob = new Blob(audioChunks, {
          type: mediaRecorder.mimeType || "audio/webm",
        });
        const fd = new FormData();
        fd.append("audio", blob, "voice.webm");
        try {
          const r = await fetch("/transcribe", { method: "POST", body: fd });
          const j = await r.json();
          if (j.text) {
            const existing = inputEl.value.trim();
            inputEl.value = existing ? existing + " " + j.text : j.text;
            inputEl.dispatchEvent(new Event("input"));
            inputEl.focus();
            // Auto-send if we got real content
            if (j.text.length > 0) send();
          } else if (j.error) {
            alert("Transcription error: " + j.error);
          }
        } catch (e) {
          alert("Transcription failed: " + e.message);
        } finally {
          micBtn.classList.remove("transcribing");
          micBtn.disabled = false;
          micBtn.title = "Click to talk";
        }
      }

      micBtn.addEventListener("click", () => {
        if (mediaRecorder && mediaRecorder.state === "recording")
          stopRecording();
        else startRecording();
      });

      document.querySelectorAll(".suggest div").forEach((el) => {
        el.addEventListener("click", () => {
          inputEl.value = el.dataset.prompt;
          inputEl.dispatchEvent(new Event("input"));
          inputEl.focus();
        });
      });

      const newChatBtn = $("#newChat");
      if (newChatBtn) {
        newChatBtn.addEventListener("click", () => {
          const id = "web-" + Math.random().toString(36).slice(2, 10);
          localStorage.setItem("xynth_session", id);
          location.reload();
        });
      }
      
      // Sidebar logic
      const sideMenu = $("#sideMenu");
      $("#historyBtn").addEventListener("click", () => sideMenu.classList.add("open"));
      $("#closeMenu").addEventListener("click", () => sideMenu.classList.remove("open"));
      $("#sideNewChat").addEventListener("click", () => {
        const id = "web-" + Math.random().toString(36).slice(2, 10);
        localStorage.setItem("xynth_session", id);
        location.reload();
      });

      // Randomized Suggestions
      const allSuggestions = [
        { icon: "🎨", text: "Critique a website's design", prompt: "Visit stripe.com and tell me what you think of its design." },
        { icon: "🖼️", text: "Generate an image", prompt: "Generate an image of a futuristic Colombo skyline at golden hour." },
        { icon: "📰", text: "Today's tech news", prompt: "Search the web for today's top tech news and summarise the top 3 stories." },
        { icon: "💰", text: "Look up live pricing", prompt: "What's the current price of GitHub Team plan per user?" },
        { icon: "📧", text: "Draft an email", prompt: "Draft a polite email declining a meeting invite due to a busy schedule." },
        { icon: "🐍", text: "Write Python code", prompt: "Write a python script that fetches the top 5 posts from HackerNews." },
        { icon: "✈️", text: "Plan a trip", prompt: "Plan a 3-day itinerary for a relaxing trip to Kyoto." },
        { icon: "🤔", text: "Brainstorm ideas", prompt: "Give me 5 unique ideas for a hackathon project." }
      ];
      const suggestEl = $("#suggestContainer");
      if (suggestEl) {
        const shuffled = allSuggestions.sort(() => 0.5 - Math.random()).slice(0, 4);
        suggestEl.innerHTML = "";
        shuffled.forEach(s => {
          const div = document.createElement("div");
          div.innerHTML = `<span class="icon">${s.icon}</span>${escapeHtml(s.text)}`;
          div.addEventListener("click", () => {
            inputEl.value = s.prompt;
            inputEl.dispatchEvent(new Event("input"));
            inputEl.focus();
            // Also hide profile btn immediately when suggest clicked
            const pBtn = $("#profileBtn");
            if (pBtn) pBtn.style.display = "none";
          });
          suggestEl.appendChild(div);
        });
      }

      // Time-based greeting
      const greetingEl = $("#greetingText");
      if (greetingEl) {
        const h = new Date().getHours();
        const greeting = h < 5 ? "Burning the midnight oil? 🌙"
          : h < 12 ? "Good morning! ☀️"
          : h < 17 ? "Good afternoon! 👋"
          : h < 21 ? "Good evening! 🌆"
          : "Working late? 🌙";
        greetingEl.textContent = greeting;
      }

      // === Text-to-speech (read replies aloud) ===
      let speakOn = localStorage.getItem("xynth_speak") === "1";
      const speakBtn = $("#speakToggle");
      function refreshSpeakBtn() {
        if (!speakBtn) return;
        speakBtn.textContent = speakOn
          ? "🔊 Speak replies: on"
          : "🔇 Speak replies: off";
        speakBtn.style.borderColor = speakOn ? "var(--accent)" : "";
      }
      refreshSpeakBtn();
      if (speakBtn) {
        speakBtn.addEventListener("click", () => {
          speakOn = !speakOn;
          localStorage.setItem("xynth_speak", speakOn ? "1" : "0");
          refreshSpeakBtn();
          if (!speakOn)
            try {
              window.speechSynthesis.cancel();
            } catch {}
        });
      }

      function stripForSpeech(md) {
        return (md || "")
          .replace(/```[\s\S]*?```/g, " ") // code fences
          .replace(/`([^`]+)`/g, "$1") // inline code
          .replace(/!\[[^\]]*\]\([^)]*\)/g, "") // images
          .replace(/\[([^\]]+)\]\([^)]+\)/g, "$1") // links → text
          .replace(/[#>*_~]+/g, "") // markdown punctuation
          .replace(/\s+/g, " ")
          .trim();
      }
      function speak(text) {
        if (!speakOn || !("speechSynthesis" in window)) return;
        const clean = stripForSpeech(text);
        if (!clean) return;
        try {
          window.speechSynthesis.cancel();
        } catch {}
        const u = new SpeechSynthesisUtterance(clean);
        u.rate = 1.05;
        u.pitch = 1.0;
        u.volume = 1.0;
        // Prefer a natural-sounding English voice if available
        const voices = window.speechSynthesis.getVoices();
        const preferred =
          voices.find(
            (v) =>
              /en-US|en-GB/i.test(v.lang) &&
              /Google|Natural|Samantha|Aria/i.test(v.name),
          ) || voices.find((v) => /en/i.test(v.lang));
        if (preferred) u.voice = preferred;
        window.speechSynthesis.speak(u);
      }
      // Some browsers load voices asynchronously
      if ("speechSynthesis" in window)
        window.speechSynthesis.onvoiceschanged = () => {};

      const resetMemBtn = $("#resetMem");
      if (resetMemBtn) {
        resetMemBtn.addEventListener("click", async () => {
          await fetch("/reset", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: sessionId }),
          });
          messagesEl.innerHTML = "";
          const ui = appendBotMessage();
          ui.bubble.innerHTML = "🧹 Memory cleared. Fresh start!";
        });
      }

      function fmt(n) {
        return n.toLocaleString();
      }

      async function loadUsage() {
        try {
          const r = await fetch("/usage");
          const j = await r.json();
          if (activeModelEl) activeModelEl.textContent = j.active;
          if (modelListEl) {
            modelListEl.innerHTML = "";
            j.models.forEach((m) => {
              const pct = Math.min(100, m.pct || 0);
              const cls = pct > 80 ? "danger" : pct > 50 ? "warn" : "";
              const el = document.createElement("div");
              el.className = "model-item" + (m.model === j.active ? " active" : "");
              el.innerHTML = `
        <div class="row1">
          <span class="m-name">${m.model}</span>
          <span class="m-tok">${fmt(m.used)} / ${fmt(m.limit)}</span>
        </div>
        <div class="bar"><i class="${cls}" style="width:${pct}%"></i></div>`;
              el.addEventListener("click", async () => {
                await fetch("/models", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ model: m.model }),
                });
                loadUsage();
              });
              modelListEl.appendChild(el);
            });
          }
        } catch (e) {
          console.error("Failed to load usage", e);
        }
      }
      loadUsage();
      setInterval(loadUsage, 15000);
    </script>
  </body>
</html>
